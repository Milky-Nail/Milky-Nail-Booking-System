server {
    listen 80;
    server_name milky-nail-studio.com www.milky-nail-studio.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name milky-nail-studio.com www.milky-nail-studio.com;

    ssl_certificate /etc/letsencrypt/live/milky-nail-studio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/milky-nail-studio.com/privkey.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}