server {
    listen 80;
    server_name milky-nail-studio.com www.milky-nail-studio.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name milky-nail-studio.com www.milky-nail-studio.com;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http:; connect-src 'self' https: http:;" always;

    ssl_certificate /etc/letsencrypt/live/milky-nail-studio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/milky-nail-studio.com/privkey.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}